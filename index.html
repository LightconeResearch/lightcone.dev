<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lightcone Research</title>
<meta name="description" content="Structured analytical tools for systematic research">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  /* ─── Light Theme (default) ─── */
  :root {
    --bg-deep:          oklch(0.965 0.004 260);
    --bg-surface:       oklch(0.993 0.002 260);
    --bg-surface-hover: oklch(0.955 0.006 260);
    --bg-elevated:      oklch(0.975 0.003 260);
    --border-subtle:    oklch(0.88 0.008 260);
    --border-faint:     oklch(0.92 0.005 260);

    --text-primary:     oklch(0.18 0.02 260);
    --text-secondary:   oklch(0.42 0.015 260);
    --text-tertiary:    oklch(0.55 0.01 260);

    --blue-border:   oklch(0.62 0.12 250);
    --blue-text:     oklch(0.40 0.12 250);
    --blue-bg:       oklch(0.97 0.010 250);
    --green-border:  oklch(0.58 0.14 155);
    --green-text:    oklch(0.38 0.12 155);
    --green-bg:      oklch(0.97 0.010 155);
    --gold-border:   oklch(0.68 0.12 70);
    --gold-text:     oklch(0.40 0.10 65);
    --gold-bg:       oklch(0.97 0.012 75);
    --orange-border: oklch(0.65 0.14 45);
    --orange-text:   oklch(0.42 0.12 40);
    --orange-bg:     oklch(0.97 0.010 50);

    --radius:    10px;
    --radius-sm: 7px;

    --shadow-sm: 0 1px 2px oklch(0.20 0.02 260 / 0.04), 0 1px 3px oklch(0.20 0.02 260 / 0.06);
    --shadow-md: 0 4px 12px oklch(0.20 0.02 260 / 0.06), 0 1px 4px oklch(0.20 0.02 260 / 0.04);
  }

  /* ─── Dark Theme ─── */
  [data-theme="dark"] {
    --bg-deep:          oklch(0.13 0.008 260);
    --bg-surface:       oklch(0.17 0.008 260);
    --bg-surface-hover: oklch(0.21 0.010 260);
    --bg-elevated:      oklch(0.19 0.008 260);
    --border-subtle:    oklch(0.26 0.012 260);
    --border-faint:     oklch(0.22 0.010 260);

    --text-primary:     oklch(0.94 0.008 260);
    --text-secondary:   oklch(0.72 0.012 260);
    --text-tertiary:    oklch(0.52 0.008 260);

    --blue-border:   oklch(0.62 0.14 250);
    --blue-text:     oklch(0.80 0.12 250);
    --blue-bg:       oklch(0.22 0.04 250);
    --green-border:  oklch(0.55 0.12 155);
    --green-text:    oklch(0.80 0.10 155);
    --green-bg:      oklch(0.20 0.04 155);
    --gold-border:   oklch(0.68 0.14 70);
    --gold-text:     oklch(0.82 0.12 70);
    --gold-bg:       oklch(0.22 0.04 70);
    --orange-border: oklch(0.68 0.16 45);
    --orange-text:   oklch(0.82 0.14 45);
    --orange-bg:     oklch(0.22 0.04 45);

    --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.15), 0 1px 3px oklch(0 0 0 / 0.20);
    --shadow-md: 0 4px 12px oklch(0 0 0 / 0.20), 0 1px 4px oklch(0 0 0 / 0.15);
  }

  html { height: 100%; }

  body {
    font-family: "Source Sans 3", system-ui, sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.5rem;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    position: relative;
  }

  .page {
    position: relative;
    z-index: 1;
    max-width: 620px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
  }

  /* ---- Theme toggle ---- */
  .theme-toggle {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 34px;
    height: 34px;
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-sm);
    box-shadow: var(--shadow-sm);
    cursor: pointer;
    color: var(--text-secondary);
    transition: border-color 0.15s ease, background 0.15s ease, color 0.15s ease;
  }

  .theme-toggle:hover {
    border-color: var(--blue-border);
    color: var(--text-primary);
  }

  .theme-toggle svg {
    width: 16px;
    height: 16px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .theme-toggle .icon-moon { display: block; }
  .theme-toggle .icon-sun  { display: none; }
  [data-theme="dark"] .theme-toggle .icon-moon { display: none; }
  [data-theme="dark"] .theme-toggle .icon-sun  { display: block; }

  /* ---- Header ---- */
  .header {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
    animation: rise 0.5s cubic-bezier(0.4, 0, 0.2, 1) both;
  }

  .logo-mark {
    width: 32px;
    height: 32px;
    color: var(--text-tertiary);
  }

  .logo-mark svg {
    width: 100%;
    height: 100%;
    fill: currentColor;
  }

  h1 {
    font-size: 1.6rem;
    font-weight: 300;
    letter-spacing: 0.04em;
    line-height: 1.2;
    color: var(--text-primary);
  }

  h1 strong {
    font-weight: 600;
  }


  /* ---- Install section ---- */
  .install {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 0;
    animation: rise 0.5s cubic-bezier(0.4, 0, 0.2, 1) 0.08s both;
  }

  .install-label {
    font-size: 0.65rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--orange-text);
    padding: 10px 16px;
    border-left: 3px solid var(--orange-border);
    background: var(--orange-bg);
    border-radius: var(--radius) var(--radius) 0 0;
  }

  .install-card {
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-top: none;
    border-radius: 0 0 var(--radius) var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    box-shadow: var(--shadow-sm);
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }

  .install-card:hover {
    box-shadow: var(--shadow-md);
  }

  .install-card code {
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 0.78rem;
    color: var(--text-primary);
    line-height: 1.6;
    white-space: nowrap;
    overflow-x: auto;
    flex: 1;
    min-width: 0;
    scrollbar-width: none;
  }

  .install-card code::-webkit-scrollbar { display: none; }

  /* ---- Copy button ---- */
  .copy-btn {
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    background: var(--bg-elevated);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-sm);
    color: var(--text-secondary);
    font-family: inherit;
    font-size: 0.72rem;
    font-weight: 600;
    padding: 5px 10px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
    line-height: 1;
  }

  .copy-btn:hover {
    color: var(--text-primary);
    border-color: var(--blue-border);
    background: var(--bg-surface-hover);
  }

  .copy-btn:active { transform: scale(0.97); }

  .copy-btn.is-copied {
    color: var(--green-text);
    border-color: var(--green-border);
    background: var(--green-bg);
  }

  .copy-btn svg {
    width: 14px;
    height: 14px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* ---- Tools row ---- */
  .tools {
    display: flex;
    gap: 0.5rem;
    animation: rise 0.5s cubic-bezier(0.4, 0, 0.2, 1) 0.16s both;
  }

  .tool {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 8px 14px;
    border-radius: var(--radius);
    border: 1px solid var(--border-faint);
    border-left: 3px solid var(--border-subtle);
    background: var(--bg-surface);
    box-shadow: var(--shadow-sm);
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
    cursor: default;
  }

  .tool:hover {
    box-shadow: var(--shadow-md);
  }

  .tool.blue {
    border-left-color: var(--blue-border);
    background: var(--blue-bg);
  }
  .tool.blue .tool-name { color: var(--blue-text); }

  .tool.green {
    border-left-color: var(--green-border);
    background: var(--green-bg);
  }
  .tool.green .tool-name { color: var(--green-text); }

  .tool.amber {
    border-left-color: var(--gold-border);
    background: var(--gold-bg);
  }
  .tool.amber .tool-name { color: var(--gold-text); }

  .tool-name {
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  /* ---- Animation ---- */
  @keyframes rise {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ---- Responsive ---- */
  @media (max-width: 540px) {
    body { padding: 2.5rem 1.25rem; }

    h1 { font-size: 1.4rem; }

    .tools { flex-direction: column; gap: 0.35rem; width: 100%; }
    .tool { width: 100%; }

    .install-card code { font-size: 0.7rem; }
  }
</style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
  <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
  <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
</button>

<div class="page">

  <header class="header">
    <div class="logo-mark">
      <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <path d="M16 16 L6 4 L26 4 Z" opacity="0.7"/>
        <path d="M16 16 L6 28 L26 28 Z" opacity="0.35"/>
      </svg>
    </div>
    <h1><strong>Lightcone</strong> Research</h1>
  </header>

  <section class="install">
    <span class="install-label">Install</span>
    <div class="install-card">
      <code id="cmd">bash &lt;(curl -fsSL https://lightconeresearch.github.io/lightcone.dev/install.sh)</code>
      <button class="copy-btn" id="copyBtn" onclick="copyCmd()">
        <svg id="copyIcon" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        <span id="copyLabel">Copy</span>
      </button>
    </div>
  </section>

  <nav class="tools">
    <div class="tool blue">
      <span class="tool-name">ASTRA</span>
    </div>
    <div class="tool green">
      <span class="tool-name">Prism-UI</span>
    </div>
    <div class="tool amber">
      <span class="tool-name">Prism</span>
    </div>
  </nav>

</div>
<script>
function copyCmd() {
  var btn = document.getElementById('copyBtn');
  var label = document.getElementById('copyLabel');
  var icon = document.getElementById('copyIcon');
  navigator.clipboard.writeText(document.getElementById('cmd').textContent).then(function () {
    btn.classList.add('is-copied');
    label.textContent = 'Copied';
    icon.innerHTML = '<polyline points="20 6 9 17 4 12"/>';
    setTimeout(function () {
      btn.classList.remove('is-copied');
      label.textContent = 'Copy';
      icon.innerHTML = '<rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>';
    }, 2000);
  });
}

function toggleTheme() {
  var html = document.documentElement;
  var isDark = html.getAttribute('data-theme') === 'dark';
  if (isDark) {
    html.removeAttribute('data-theme');
    localStorage.removeItem('theme');
  } else {
    html.setAttribute('data-theme', 'dark');
    localStorage.setItem('theme', 'dark');
  }
}

// Restore saved theme
(function () {
  if (localStorage.getItem('theme') === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
})();
</script>
</body>
</html>

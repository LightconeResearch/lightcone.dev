<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lightcone Research</title>
<meta name="description" content="Structured analytical tools for systematic research">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  /* ─── Light Theme (default) ─── */
  :root {
    --bg-deep:          oklch(0.965 0.004 260);
    --bg-surface:       oklch(0.993 0.002 260);
    --bg-surface-hover: oklch(0.955 0.006 260);
    --bg-elevated:      oklch(0.975 0.003 260);
    --border-subtle:    oklch(0.88 0.008 260);
    --border-faint:     oklch(0.92 0.005 260);

    --text-primary:     oklch(0.18 0.02 260);
    --text-secondary:   oklch(0.42 0.015 260);
    --text-tertiary:    oklch(0.55 0.01 260);

    --blue-border:   oklch(0.62 0.12 250);
    --blue-text:     oklch(0.40 0.12 250);
    --blue-bg:       oklch(0.97 0.010 250);
    --green-border:  oklch(0.58 0.14 155);
    --green-text:    oklch(0.38 0.12 155);
    --green-bg:      oklch(0.97 0.010 155);
    --gold-border:   oklch(0.68 0.12 70);
    --gold-text:     oklch(0.40 0.10 65);
    --gold-bg:       oklch(0.97 0.012 75);
    --orange-border: oklch(0.65 0.14 45);
    --orange-text:   oklch(0.42 0.12 40);
    --orange-bg:     oklch(0.97 0.010 50);

    --radius:    10px;
    --radius-sm: 7px;

    --shadow-sm: 0 1px 2px oklch(0.20 0.02 260 / 0.04), 0 1px 3px oklch(0.20 0.02 260 / 0.06);
    --shadow-md: 0 4px 12px oklch(0.20 0.02 260 / 0.06), 0 1px 4px oklch(0.20 0.02 260 / 0.04);
    --shadow-lg: 0 12px 40px oklch(0.20 0.02 260 / 0.10), 0 4px 12px oklch(0.20 0.02 260 / 0.06);
  }

  /* ─── Dark Theme ─── */
  [data-theme="dark"] {
    --bg-deep:          oklch(0.13 0.008 260);
    --bg-surface:       oklch(0.17 0.008 260);
    --bg-surface-hover: oklch(0.21 0.010 260);
    --bg-elevated:      oklch(0.19 0.008 260);
    --border-subtle:    oklch(0.26 0.012 260);
    --border-faint:     oklch(0.22 0.010 260);

    --text-primary:     oklch(0.94 0.008 260);
    --text-secondary:   oklch(0.72 0.012 260);
    --text-tertiary:    oklch(0.52 0.008 260);

    --blue-border:   oklch(0.62 0.14 250);
    --blue-text:     oklch(0.80 0.12 250);
    --blue-bg:       oklch(0.22 0.04 250);
    --green-border:  oklch(0.55 0.12 155);
    --green-text:    oklch(0.80 0.10 155);
    --green-bg:      oklch(0.20 0.04 155);
    --gold-border:   oklch(0.68 0.14 70);
    --gold-text:     oklch(0.82 0.12 70);
    --gold-bg:       oklch(0.22 0.04 70);
    --orange-border: oklch(0.68 0.16 45);
    --orange-text:   oklch(0.82 0.14 45);
    --orange-bg:     oklch(0.22 0.04 45);

    --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.15), 0 1px 3px oklch(0 0 0 / 0.20);
    --shadow-md: 0 4px 12px oklch(0 0 0 / 0.20), 0 1px 4px oklch(0 0 0 / 0.15);
    --shadow-lg: 0 12px 40px oklch(0 0 0 / 0.30), 0 4px 12px oklch(0 0 0 / 0.20);
  }

  html { height: 100%; }

  body {
    font-family: "Source Sans 3", system-ui, sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    min-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ─── Panel (the main card) ─── */
  .panel {
    max-width: 680px;
    width: 100%;
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: 14px;
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    animation: rise 0.4s cubic-bezier(0.4, 0, 0.2, 1) both;
  }

  /* ─── Strip (top header bar, like AnalysisStrip) ─── */
  .strip {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 14px;
    border-bottom: 1px solid var(--border-faint);
  }

  .strip-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-mark {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
    color: var(--text-tertiary);
  }

  .logo-mark svg {
    width: 100%;
    height: 100%;
    fill: currentColor;
  }

  .strip-name {
    font-size: 1.05rem;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--text-primary);
    line-height: 1;
  }

  .strip-name span {
    font-weight: 400;
    color: var(--text-secondary);
  }

  /* ─── Theme toggle ─── */
  .theme-toggle {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 30px;
    height: 30px;
    background: transparent;
    border: 1px solid var(--border-subtle);
    border-radius: 8px;
    cursor: pointer;
    color: var(--text-tertiary);
    transition: border-color 0.15s, color 0.15s, background 0.15s;
  }

  .theme-toggle:hover {
    color: var(--text-primary);
    background: var(--bg-surface-hover);
  }

  .theme-toggle svg {
    width: 14px;
    height: 14px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .theme-toggle .icon-moon { display: block; }
  .theme-toggle .icon-sun  { display: none; }
  [data-theme="dark"] .theme-toggle .icon-moon { display: none; }
  [data-theme="dark"] .theme-toggle .icon-sun  { display: block; }

  /* ─── Panel body ─── */
  .panel-body {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* ─── StackGroup pattern ─── */
  .stack {
    border: 1px solid var(--border-faint);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }

  .stack-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    border-left: 3px solid var(--border-subtle);
    background: var(--bg-elevated);
  }

  .stack-header-title {
    font-size: 0.68rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .stack-header.orange { border-left-color: var(--orange-border); background: var(--orange-bg); }
  .stack-header.orange .stack-header-title { color: var(--orange-text); }

  .stack-header.blue { border-left-color: var(--blue-border); background: var(--blue-bg); }
  .stack-header.blue .stack-header-title { color: var(--blue-text); }

  /* ─── Install card (inside stack) ─── */
  .install-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 12px 14px;
    background: var(--bg-deep);
  }

  .install-row code {
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 0.75rem;
    color: var(--text-secondary);
    line-height: 1.6;
    white-space: nowrap;
    overflow-x: auto;
    flex: 1;
    min-width: 0;
    scrollbar-width: none;
  }

  .install-row code::-webkit-scrollbar { display: none; }

  /* ─── Copy button ─── */
  .copy-btn {
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    background: transparent;
    border: none;
    color: var(--orange-text);
    font-family: inherit;
    font-size: 0.62rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 2px 0;
    cursor: pointer;
    transition: color 0.15s, opacity 0.15s;
    line-height: 1;
    opacity: 0.7;
  }

  .copy-btn:hover {
    opacity: 1;
  }

  .copy-btn:active { transform: scale(0.97); }

  .copy-btn.is-copied {
    color: var(--green-text);
    opacity: 1;
  }

  .copy-btn svg {
    width: 12px;
    height: 12px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* ─── Tools footer ─── */
  .panel-footer {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 20px;
    border-top: 1px solid var(--border-faint);
  }

  .footer-label {
    font-size: 0.6rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--text-tertiary);
    margin-right: 2px;
  }

  .tool-pill {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .tool-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .tool-dot.blue  { background: var(--blue-border); }
  .tool-dot.green { background: var(--green-border); }
  .tool-dot.amber { background: var(--gold-border); }

  .tool-name {
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 0.68rem;
    font-weight: 500;
    color: var(--text-tertiary);
    letter-spacing: 0.01em;
  }

  /* ─── Animation ─── */
  @keyframes rise {
    from { opacity: 0; transform: scale(0.97) translateY(8px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* ─── Responsive ─── */
  @media (max-width: 540px) {
    body { padding: 1rem; }
    .panel { border-radius: 12px; }
    .strip { padding: 14px 16px 12px; }
    .strip-name { font-size: 0.95rem; }
    .panel-body { padding: 12px; gap: 10px; }
    .install-row code { font-size: 0.68rem; }
  }
</style>
</head>
<body>

<div class="panel">
  <div class="strip">
    <div class="strip-left">
      <div class="logo-mark">
        <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
          <path d="M16 14 L7 3 L25 3 Z" opacity="0.8"/>
          <path d="M16 18 L7 29 L25 29 Z" opacity="0.35"/>
        </svg>
      </div>
      <div class="strip-name">Lightcone <span>Research</span></div>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
      <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
  </div>

  <div class="panel-body">
    <div class="stack">
      <div class="stack-header orange">
        <span class="stack-header-title">Install</span>
        <button class="copy-btn" id="copyBtn" onclick="copyCmd()">
          <svg id="copyIcon" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          <span id="copyLabel">Copy</span>
        </button>
      </div>
      <div class="install-row">
        <code id="cmd">curl -fsSL https://lightconeresearch.github.io/lightcone.dev/install.sh | bash</code>
      </div>
    </div>

  </div>

  <div class="panel-footer">
    <span class="footer-label">Tools</span>
    <div class="tool-pill">
      <span class="tool-dot blue"></span>
      <span class="tool-name">ASTRA</span>
    </div>
    <div class="tool-pill">
      <span class="tool-dot green"></span>
      <span class="tool-name">Prism-UI</span>
    </div>
    <div class="tool-pill">
      <span class="tool-dot amber"></span>
      <span class="tool-name">Prism</span>
    </div>
  </div>
</div>

<script>
function copyCmd() {
  var btn = document.getElementById('copyBtn');
  var label = document.getElementById('copyLabel');
  var icon = document.getElementById('copyIcon');
  navigator.clipboard.writeText(document.getElementById('cmd').textContent).then(function () {
    btn.classList.add('is-copied');
    label.textContent = 'Copied';
    icon.innerHTML = '<polyline points="20 6 9 17 4 12"/>';
    setTimeout(function () {
      btn.classList.remove('is-copied');
      label.textContent = 'Copy';
      icon.innerHTML = '<rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>';
    }, 2000);
  });
}

function toggleTheme() {
  var html = document.documentElement;
  var isDark = html.getAttribute('data-theme') === 'dark';
  if (isDark) {
    html.removeAttribute('data-theme');
    localStorage.removeItem('theme');
  } else {
    html.setAttribute('data-theme', 'dark');
    localStorage.setItem('theme', 'dark');
  }
}

(function () {
  if (localStorage.getItem('theme') === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
})();
</script>
</body>
</html>
